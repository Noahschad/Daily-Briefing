<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Daily Briefing</title>
<link rel="manifest" href="manifest.json" />
<link rel="apple-touch-icon" href="icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="theme-color" content="#2E2C27" />
<style>
  :root {
    --bg: #FCFCFB;
    --ink: #2E2C27;
    --ink-soft: #6B6A63;
    --hairline: #E4E3DC;
    --clay: #C6613F;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: -apple-system, "Segoe UI", sans-serif;
    padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
    max-width: 640px;
    margin-inline: auto;
  }
  header {
    padding: 24px 0 16px;
    border-bottom: 1px solid var(--hairline);
    margin-bottom: 20px;
  }
  h1 { font-size: 22px; margin: 0 0 4px; }
  .subtitle { color: var(--ink-soft); font-size: 14px; }

  #setup {
    background: #F2F1EC;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 24px;
  }
  #setup button {
    background: var(--ink);
    color: white;
    border: none;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
  }
  #push-status { font-size: 13px; color: var(--ink-soft); margin-top: 8px; }
  #subscription-box { display: none; margin-top: 12px; }
  #subscription-output {
    width: 100%;
    height: 100px;
    font-family: monospace;
    font-size: 11px;
    padding: 8px;
    border-radius: 6px;
    border: 1px solid var(--hairline);
  }
  #copy-btn {
    margin-top: 6px;
    background: transparent;
    border: 1px solid var(--ink);
    color: var(--ink);
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
  }

  .date { color: var(--ink-soft); font-size: 13px; margin-bottom: 8px; }
  .summary { font-size: 17px; line-height: 1.5; margin-bottom: 24px; }
  h2 {
    font-size: 15px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    color: var(--ink-soft);
    border-bottom: 1px solid var(--hairline);
    padding-bottom: 8px;
    margin-top: 32px;
  }
  .item { padding: 16px 0; border-bottom: 1px solid var(--hairline); }
  .item h3 { margin: 0 0 6px; font-size: 17px; }
  .item p { margin: 0 0 6px; line-height: 1.5; color: var(--ink); }
  .source { font-size: 12px; color: var(--ink-soft); }
  .empty { color: var(--ink-soft); text-align: center; padding: 40px 0; }
</style>
</head>
<body>
  <header>
    <h1>Daily Briefing</h1>
    <div class="subtitle">Weltpolitik &amp; Märkte</div>
  </header>

  <div id="setup">
    <button id="enable-btn">Benachrichtigungen aktivieren</button>
    <div id="push-status"></div>
    <div id="subscription-box">
      <textarea id="subscription-output" readonly></textarea>
      <button id="copy-btn">Kopieren</button>
      <div style="font-size:12px; color: var(--ink-soft); margin-top: 6px;">
        Füge diesen Text als GitHub Secret <code>WEB_PUSH_SUBSCRIPTION</code> ein (siehe README).
      </div>
    </div>
  </div>

  <div id="briefing"></div>

  <script src="app.js"></script>
</body>
</html>
